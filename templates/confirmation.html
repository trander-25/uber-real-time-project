<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ride Confirmed</title>
    <style>
        :root {
            --bg: #f6f7f9;
            --panel: #ffffff;
            --text: #15171a;
            --muted: #667085;
            --line: #e6e8ec;
            --accent: #111111;
            --green: #16a35b;
            --green-soft: #eaf8f0;
            --shadow: 0 18px 45px rgba(24, 29, 39, 0.10);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 70% 15%, rgba(22, 163, 91, 0.15), transparent 30%),
                linear-gradient(135deg, #fbfbfc 0%, var(--bg) 58%, #eef2f0 100%);
        }

        .card {
            width: min(520px, 100%);
            border: 1px solid rgba(230, 232, 236, 0.9);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.94);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .top {
            padding: 34px 32px 26px;
            text-align: center;
            border-bottom: 1px solid var(--line);
        }

        .check {
            display: grid;
            place-items: center;
            width: 72px;
            height: 72px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: var(--green-soft);
            color: var(--green);
            font-size: 38px;
            font-weight: 900;
        }

        h1 {
            margin: 0;
            font-size: 34px;
            line-height: 1.12;
            letter-spacing: 0;
        }

        p {
            margin: 12px 0 0;
            color: var(--muted);
            line-height: 1.6;
        }

        .details {
            padding: 24px 32px 30px;
        }

        .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            padding: 14px 0;
            border-bottom: 1px solid var(--line);
        }

        .row:last-of-type {
            border-bottom: 0;
        }

        .label {
            color: var(--muted);
            font-size: 14px;
        }

        .value {
            font-weight: 800;
            text-align: right;
        }

        .button {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 52px;
            margin-top: 22px;
            border-radius: 8px;
            background: var(--accent);
            color: #ffffff;
            font-weight: 800;
            text-decoration: none;
            transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
        }

        .button:hover {
            transform: translateY(-1px);
            background: #000000;
            box-shadow: 0 12px 24px rgba(17, 17, 17, 0.18);
        }

        @media (max-width: 520px) {
            body {
                padding: 16px;
            }

            .top,
            .details {
                padding-left: 22px;
                padding-right: 22px;
            }

            h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <main class="card">
        <section class="top">
            <div class="check">&#10003;</div>
            <h1>Ride Confirmed</h1>
            <p>Your booking event was generated and sent to the real-time pipeline.</p>
        </section>

        <section class="details">
            <div class="row">
                <span class="label">Status</span>
                <span class="value">Sent to Event Hubs</span>
            </div>
            <div class="row">
                <span class="label">Source</span>
                <span class="value">FastAPI Producer</span>
            </div>
            <div class="row">
                <span class="label">Next Layer</span>
                <span class="value">Databricks Bronze</span>
            </div>

            <a href="/" class="button">Book Another Ride</a>
        </section>
    </main>
</body>
</html>
